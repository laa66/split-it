# Dev profile. Mailhog SMTP (no auth/TLS). JWT secret defaulted for local convenience.
spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
  mail:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  base-url: http://localhost:5173
  jwt:
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-min-32-bytes-long}

logging:
  level:
    com.splitit: DEBUG
